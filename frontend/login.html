<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediTrack - Login</title>
    <link rel="stylesheet" href="login-styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>🏥 MediTrack</h1>
                <p>Clinical Patient Data & Billing Management</p>
            </div>

            <div id="login-form-container">
                <h2>Login</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Enter your username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn-login">Login</button>
                </form>
                <p class="toggle-form">Don't have an account? <a href="#" onclick="showRegisterForm()">Register here</a></p>
                <div id="error-message" class="error-message"></div>
            </div>

            <div id="register-form-container" style="display:none;">
                <h2>Create Account</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="reg-first-name">First Name</label>
                        <input type="text" id="reg-first-name" placeholder="First name" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-last-name">Last Name</label>
                        <input type="text" id="reg-last-name" placeholder="Last name" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" placeholder="Choose a username" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" placeholder="At least 6 characters" required>
                    </div>
                    <button type="submit" class="btn-login">Register</button>
                </form>
                <p class="toggle-form">Already have an account? <a href="#" onclick="showLoginForm()">Login here</a></p>
                <div id="error-message-reg" class="error-message"></div>
            </div>
        </div>
    </div>

    <script src="login-script.js"></script>
</body>
</html>
